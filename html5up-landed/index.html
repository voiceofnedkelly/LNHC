<!DOCTYPE HTML>
<html>
    <head>
        <title>Voices - Ned Kelly</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="assets/css/main.css" />
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
        
        <style>
            /* Custom Ned Kelly Theme Styles */
            body {
                background-color: #1a1a1a;
            }

            /* Splash Screen Animation */
            #splash-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: #0d0d0d;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                animation: fadeOut 1.5s ease-in-out 3s forwards;
            }

            /* Stylized Ned Kelly Helmet Slit */
            .helmet-slit {
                width: 180px;
                height: 35px;
                background: #000;
                border: 6px solid #333;
                border-radius: 3px;
                box-shadow: inset 0 0 15px rgba(0,0,0,1), 0 0 20px rgba(255,255,255,0.05);
                margin-bottom: 30px;
                animation: pulse 2s infinite;
            }

            #splash-screen h1 {
                font-family: 'Georgia', serif;
                color: #e0e0e0;
                font-size: 3rem;
                letter-spacing: 0.3rem;
                text-transform: uppercase;
                margin: 0;
                text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
                animation: fadeIn 1s ease-in;
            }

            #splash-screen p {
                color: #777;
                font-style: italic;
                font-size: 1.2rem;
                margin-top: 10px;
                animation: fadeIn 1.5s ease-in;
            }

            /* Keyframes for Splash Screen */
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes fadeOut {
                to { opacity: 0; visibility: hidden; }
            }
            @keyframes pulse {
                0% { border-color: #333; }
                50% { border-color: #555; }
                100% { border-color: #333; }
            }

            /* Main Page Enhancements */
            #wrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 2rem;
                text-align: center;
                /* Subtle outback/rustic background overlay */
                background: linear-gradient(rgba(15, 15, 15, 0.85), rgba(15, 15, 15, 0.95)), url('https://images.unsplash.com/photo-1518134346374-184f9d21cb2c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            }

            .main-header h1 {
                font-size: 4.5rem;
                color: #fff;
                margin-bottom: 0.5rem;
                border-bottom: 4px solid #8b0000; /* Iron and blood thematic color */
                display: inline-block;
                padding-bottom: 10px;
                text-transform: uppercase;
                letter-spacing: 0.1rem;
            }

            .intro-text {
                font-size: 1.25rem;
                color: #cccccc;
                max-width: 650px;
                margin: 1.5rem auto 3rem auto;
                line-height: 1.8;
                font-family: 'Georgia', serif;
            }

            /* Button Styling Overrides */
            .actions.custom-actions {
                display: flex;
                gap: 20px;
                justify-content: center;
                flex-wrap: wrap;
                width: 100%;
                max-width: 800px;
                margin: 0 auto;
            }

            .actions.custom-actions li {
                flex: 1;
                min-width: 250px;
            }

            .actions.custom-actions a.button.primary {
                background-color: #8b0000 !important; /* Crimson Red */
                color: #ffffff !important;
                border-radius: 4px;
                font-weight: 700;
                letter-spacing: 0.1rem;
                box-shadow: 0 4px 15px rgba(0,0,0,0.6);
                transition: all 0.3s ease;
                border: 1px solid #5a0000;
            }

            .actions.custom-actions a.button.primary:hover {
                background-color: #a50000 !important;
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            }
        </style>
    </head>
    <body class="is-preload">

        <div id="splash-screen">
            <div class="helmet-slit"></div>
            <h1>Voices - Ned Kelly</h1>
        </div>

        <div id="wrapper">

            <header class="main-header">
                <h1>Voices - Ned Kelly</h1>
            </header>

            <p class="intro-text">
				Website descriptor
            </p>

            <ul class="actions custom-actions fit">
                <li><a href="Main.html" class="button primary fit">Website</a></li>
                <li><a href="elements.html" class="button primary fit">Bibliography</a></li>
            </ul>

        </div>

        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/jquery.scrollex.min.js"></script>
        <script src="assets/js/jquery.scrolly.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script src="assets/js/main.js"></script>
        
        <script>
            window.addEventListener('load', function() {
                setTimeout(function() {
                    var splash = document.getElementById('splash-screen');
                    if (splash) {
                        splash.style.display = 'none';
                    }
                }, 4500); // Wait for the 3s delay + 1.5s fadeOut animation to finish
            });
        </script>

    </body>
</html>
